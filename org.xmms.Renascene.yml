app-id: org.xmms.Renascene
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: xmms

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/xmms-renascene/cargo
    CARGO_NET_OFFLINE: "true"
    RUST_BACKTRACE: "1"

finish-args:
  # Wayland and X11
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Audio playback
  - --socket=pulseaudio
  # Network for stream URLs
  - --share=network
  # MPRIS D-Bus interface
  - --own-name=org.mpris.MediaPlayer2.xmms_renascene
  # Access common music/download locations. Other files can be opened through portals.
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
  # Match the local ./repo launcher defaults; the skin UI currently renders most
  # reliably through GTK's cairo renderer in the Flatpak sandbox.
  - --env=GDK_DISABLE=gl
  - --env=GSK_RENDERER=cairo
  # Point the skin browser at the application-owned system skin location.
  - --env=XMMS_RS_SYSTEM_SKIN_DIR=/app/share/xmms/Skins

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man/man3
  - "*.a"
  - "*.la"

modules:
  - name: xmms-renascene
    buildsystem: simple
    build-commands:
      - cargo build --release --locked --offline
      - install -Dm755 target/release/xmms-rs /app/bin/xmms-rs
      - printf '#!/bin/sh\nexec /app/bin/xmms-rs "$@"\n' > /app/bin/xmms
      - chmod 755 /app/bin/xmms
      - install -Dm644 data/org.xmms.Renascene.desktop /app/share/applications/org.xmms.Renascene.desktop
      - install -Dm644 data/org.xmms.Renascene.metainfo.xml /app/share/metainfo/org.xmms.Renascene.metainfo.xml
      - install -Dm644 data/org.xmms.Renascene.png /app/share/icons/hicolor/128x128/apps/org.xmms.Renascene.png
      - install -Dm644 data/xmms.1 /app/share/man/man1/xmms.1
      - mkdir -p /app/share/xmms/Skins/Default
      - cp -a data/defskin/*.xpm /app/share/xmms/Skins/Default/
    sources:
      - type: dir
        path: .
        skip:
          - .git
          - .flatpak-builder
          - .flatpak-cargo-*
          - build-flatpak
          - dist
          - target
          - "*.wsz"
          - pi-session-*.html
          - screenshot.png
      - cargo-sources.json
