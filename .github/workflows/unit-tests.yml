name: Unit tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  cargo-test:
    name: cargo test
    runs-on: ubuntu-latest

    env:
      GSK_RENDERER: cairo
      RUST_BACKTRACE: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            build-essential \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libasound2-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-4-dev \
            pkg-config \
            xvfb

      - name: Run unit tests
        run: xvfb-run -a cargo test --locked --all-targets

  frontend-audio-matrix:
    name: ${{ matrix.frontend }} + ${{ matrix.audio }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - frontend: gtk
            frontend_feature: gtk-ui
            audio: gstreamer
            audio_feature: gstreamer-backend
            cargo_targets: --all-targets
          - frontend: gtk
            frontend_feature: gtk-ui
            audio: rodio
            audio_feature: rodio-backend
            cargo_targets: --all-targets
          - frontend: egui
            frontend_feature: egui-ui
            audio: gstreamer
            audio_feature: gstreamer-backend
            cargo_targets: --lib --bins
          - frontend: egui
            frontend_feature: egui-ui
            audio: rodio
            audio_feature: rodio-backend
            cargo_targets: --lib --bins

    env:
      GSK_RENDERER: cairo
      RUST_BACKTRACE: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            build-essential \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libasound2-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-4-dev \
            pkg-config \
            xvfb

      - name: Test selected frontend/audio backend combination
        run: |
          FEATURES="${{ matrix.frontend_feature }},${{ matrix.audio_feature }}"
          xvfb-run -a cargo test --locked --no-default-features --features "$FEATURES" ${{ matrix.cargo_targets }}

  pye2e-docker:
    name: Python GUI E2E Docker
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Python GUI E2E tests in Docker
        run: ./repo pye2e-docker

      - name: Upload E2E screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pye2e-docker-output
          path: testoutput
          if-no-files-found: ignore

  android-pye2e:
    name: Android UI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_API_LEVEL: "36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "27.2.12479018"
      RUST_BACKTRACE: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Rust Android toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android-pye2e

      - name: Install cargo-apk
        run: cargo install cargo-apk --version 0.10.0 --locked

      - name: Build Android emulator APK
        run: ./repo android-apk-emulator

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android UI E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-snapshot
            -noaudio
            -no-boot-anim
            -no-metrics
          script: .github/scripts/run-android-ui-e2e.sh

      - name: Upload Android E2E screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-pye2e-output
          path: testoutput
          if-no-files-found: ignore
