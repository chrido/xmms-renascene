name: Unit tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  cargo-test:
    name: cargo test
    runs-on: ubuntu-latest

    env:
      GSK_RENDERER: cairo
      RUST_BACKTRACE: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            build-essential \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libasound2-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-4-dev \
            pkg-config \
            xvfb

      - name: Run unit tests
        run: xvfb-run -a cargo test --locked --all-targets

  frontend-audio-matrix:
    name: ${{ matrix.frontend }} + ${{ matrix.audio }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - frontend: gtk
            frontend_feature: gtk-ui
            audio: gstreamer
            audio_feature: gstreamer-backend
            cargo_targets: --all-targets
          - frontend: gtk
            frontend_feature: gtk-ui
            audio: rodio
            audio_feature: rodio-backend
            cargo_targets: --all-targets
          - frontend: egui
            frontend_feature: egui-ui
            audio: gstreamer
            audio_feature: gstreamer-backend
            cargo_targets: --lib --bins
          - frontend: egui
            frontend_feature: egui-ui
            audio: rodio
            audio_feature: rodio-backend
            cargo_targets: --lib --bins

    env:
      GSK_RENDERER: cairo
      RUST_BACKTRACE: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            build-essential \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libasound2-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-4-dev \
            pkg-config \
            xvfb

      - name: Test selected frontend/audio backend combination
        run: |
          FEATURES="${{ matrix.frontend_feature }},${{ matrix.audio_feature }}"
          xvfb-run -a cargo test --locked --no-default-features --features "$FEATURES" ${{ matrix.cargo_targets }}

  pye2e-docker:
    name: Python GUI E2E Docker
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Python GUI E2E tests in Docker
        run: ./repo pye2e-docker

      - name: Upload E2E screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pye2e-docker-output
          path: testoutput
          if-no-files-found: ignore
