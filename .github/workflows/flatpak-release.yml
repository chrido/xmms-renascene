name: Flatpak release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatpak-bundle:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest

    env:
      BUNDLE: xmms-renascene-x86_64.flatpak

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build single-file Flatpak bundle
        run: python3 scripts/flatpak.py build-release-bundle --install-build-tools --bundle="$BUNDLE"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmms-renascene-flatpak
          path: |
            ${{ env.BUNDLE }}
            ${{ env.BUNDLE }}.sha256

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('main-{0}', github.sha) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Main build {0}', github.sha) }}
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
          files: |
            ${{ env.BUNDLE }}
            ${{ env.BUNDLE }}.sha256
          body: |
            Download `xmms-renascene-x86_64.flatpak` and install it with:

            ```sh
            flatpak install --user ./xmms-renascene-x86_64.flatpak
            flatpak run org.xmms.Renascene
            ```
