stages:
  - build
  - release

flatpak:
  image: 'quay.io/gnome_infrastructure/gnome-runtime-images:gnome-48'
  stage: build
  variables:
    MANIFEST_PATH: "org.xmms.Resuscitated.yml"
    FLATPAK_MODULE: "xmms-resuscitated"
    APP_ID: "org.xmms.Resuscitated"
    BUNDLE: "xmms-resuscitated.flatpak"
  script:
    - flatpak-builder --user --disable-rofiles-fuse --force-clean
      --repo=repo flatpak_app ${MANIFEST_PATH}
    - flatpak build-bundle repo ${BUNDLE} ${APP_ID}
  artifacts:
    name: 'xmms-resuscitated-flatpak'
    paths:
      - "${BUNDLE}"
    expire_in: 7 days
  rules:
    - changes:
        - src/**/*
        - data/**/*
        - meson.build
        - meson/**/*
        - org.xmms.Resuscitated.yml
        - .gitlab-ci.yml

release:
  image: 'registry.gitlab.com/gitlab-org/release-cli:latest'
  stage: release
  needs:
    - job: flatpak
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_SHORT_SHA}"
  release:
    tag_name: 'build-${CI_PIPELINE_IID}'
    name: 'Build ${CI_PIPELINE_IID}'
    description: 'Flatpak build from commit ${CI_COMMIT_SHORT_SHA}'
    assets:
      links:
        - name: 'xmms-resuscitated.flatpak'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/xmms-resuscitated.flatpak?job=flatpak'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/**/*
        - data/**/*
        - meson.build
        - meson/**/*
        - org.xmms.Resuscitated.yml
        - .gitlab-ci.yml
